<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetBuddy | Recuperar E-mail</title>
  <link rel="stylesheet" href="./stylelogin.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#ffffff;--text:#222;--card:#f5f5f5}
body.dark{--bg:#121212;--text:#f1f1f1;--card:#1e1e1e}
body{background:var(--bg)!important;color:var(--text)!important;transition:.3s}
.card,.pet-card,.produto,.plano{background:var(--card)!important;transition:.3s ease}
.plano:hover,.card:hover,.pet-card:hover,.produto:hover{transform:translateY(-6px)}
.dark-toggle{position:fixed;top:15px;right:15px;z-index:9999;padding:10px 14px;border-radius:20px;cursor:pointer}
.hero-simple{padding:60px 20px;text-align:center}
</style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="container topbar-content">
        <p>A Saúde do seu Animalzinho é na PetMed</p>
        <a href="#" class="saiba-mais">Saber mais</a>
      </div>
    </div>
  
    <div class="navbar">
      <div class="container nav-container">
        <a href="../home/index.html" class="logo-link">
          <img src="../assets/Logo Principal.png" alt="Logo PetBuddy" class="logo">
        </a>
  
        <nav class="menu">
          <a href="../home/index.html">Início</a>
          <a href="#">Promoções</a>
          <a href="../petmed/../petmed/petmed.html">PetMed</a>
          <a href="../petlar/homepet.html">PetLar</a>
          <a href="#">Contato</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="cadastro-wrapper container">
    <div class="cadastro-box">
        
        <div class="login-img-area">
            <img src="../assets/GatoLogin.png" alt="Gato PetBuddy" class="pet-login-img">
        </div>

        <div class="cadastro-form-area">
            
            <div class="cadastro-card card-recuperar">
                <h2>Recuperar E-mail</h2>
                
                <form>
                    <div class="form-group">
                        <label>Número de Telefone</label>
                        <input type="tel" id="telefoneRec" placeholder="(00) 0 0000-0000" maxlength="15" oninput="mascaraTelefone(this)" required>
                    </div>

                    <p class="info-txt">Será enviado um Link para o seu Telefone para Recuperar O Acesso a sua conta!</p>

                    <div class="btn-create-container">
                        <button type="button" class="btn-create" onclick="enviarLinkTelefone()">Enviar Link</button>
                    </div>

                    <p class="reenviar-txt">Não recebeu? <a href="#" onclick="reenviarCodigoTelefone()">Reenviar Código para Telefone</a></p>
                </form>

            </div>
        </div>

    </div>
  </main>

  <script>
      function mascaraTelefone(input) {
          let v = input.value.replace(/\D/g, ''); 
          if (v.length > 11) v = v.substring(0, 11); 
          
          if (v.length >= 3) {
              v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
          }
          if (v.length >= 11) {
              v = v.substring(0, 10) + '-' + v.substring(10);
          }
          input.value = v;
      }
      
      function enviarLinkTelefone() {
          const telefone = document.getElementById('telefoneRec').value;
          if(!telefone) {
              alert('Por favor, digite seu telefone!');
              return;
          }
          alert('Link de recuperação enviado para o telefone ' + telefone + ' (Simulação)');
          window.location.href = 'login.html';
      }
      
      function reenviarCodigoTelefone() {
          alert('Código reenviado para o seu telefone! (Simulação)');
      }
  </script>

  <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
  <script>
      function toggleDarkMode(){
          document.body.classList.toggle('dark');
          localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      }
      if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  </script>
</body>
</html>
