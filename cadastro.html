<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetBuddy | Criar Conta</title>
  <link rel="stylesheet" href="./stylecadastro.css"> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#ffffff;--text:#222;--card:#f5f5f5}
body.dark{--bg:#121212;--text:#f1f1f1;--card:#1e1e1e}
body{background:var(--bg)!important;color:var(--text)!important;transition:.3s}
.card,.pet-card,.produto,.plano{background:var(--card)!important;transition:.3s ease}
.plano:hover,.card:hover,.pet-card:hover,.produto:hover{transform:translateY(-6px)}
.dark-toggle{position:fixed;top:15px;right:15px;z-index:9999;padding:10px 14px;border-radius:20px;cursor:pointer}
.hero-simple{padding:60px 20px;text-align:center}
</style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="container topbar-content">
        <p>A Saúde do seu Animalzinho é na PetMed</p>
        <a href="#" class="saiba-mais">Saber mais</a>
      </div>
    </div>
  
    <div class="navbar">
      <div class="container nav-container">
        <a href="../home/index.html" class="logo-link">
          <img src="../assets/Logo Principal.png" alt="Logo PetBuddy" class="logo">
        </a>
  
        <nav class="menu">
          <a href="../home/index.html">Início</a>
          <a href="#">Promoções</a>
          <a href="../petmed/../petmed/petmed.html">PetMed</a>
          <a href="../petlar/homepet.html">PetLar</a>
          <a href="#">Contato</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="cadastro-wrapper container">
    <div class="cadastro-box">
        
        <div class="cadastro-img-area">
            <img src="../assets/PetCadastro.png" alt="Cachorro PetBuddy" class="pet-cadastro-img">
        </div>

        <div class="cadastro-form-area">
            <div class="cadastro-card">
                <h2>Faça o Cadastro da sua Conta!</h2>
                
                <form id="cadastroForm">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" placeholder="Insira seu nome completo aqui." required>
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="Insira seu E-mail aqui." required>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="senha" placeholder="Escreva sua senha aqui" required>
                    </div>

                    <div class="form-group">
                        <label>Confirmação da Senha</label>
                        <input type="password" id="confirmSenha" placeholder="Confirme a sua senha aqui" required>
                    </div>

                    <div class="form-group">
                        <label>Número de Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 0 0000-0000" maxlength="15" oninput="mascaraTelefone(this)" required>
                    </div>

                    <div class="btn-create-container">
                        <button type="button" class="btn-create" onclick="validarCadastro()">Criar conta</button>
                    </div>

                   <p class="login-txt">Já possui uma conta? <a href="../login/login.html">Faça Log in</a></p>

                    <div class="ou-divider">- OU -</div>

                    <div class="social-row">
                        <button type="button" class="social-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> 
                            Entre com Google
                        </button>
                        <button type="button" class="social-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> 
                            Entre com Facebook
                        </button>
                        <button type="button" class="social-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="black"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.31-.82 3.5-.78 1.48.05 2.6.66 3.32 1.76-2.96 1.75-2.42 5.56.39 6.64-1.2 1.83-2.18 3.55-2.29 4.55zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.3 2.31-1.89 4.25-3.74 4.25z"/></svg> 
                            Entre com Apple
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
  </main>

  <script>
      function mascaraTelefone(input) {
          let v = input.value.replace(/\D/g, ''); 
          if (v.length > 11) v = v.substring(0, 11); 
          
          if (v.length >= 3) {
              v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
          }
          if (v.length >= 11) {
              v = v.substring(0, 10) + '-' + v.substring(10);
          }
          input.value = v;
      }
      
      function validarCadastro() {
          const nome = document.getElementById('nome').value;
          const email = document.getElementById('email').value;
          const senha = document.getElementById('senha').value;
          const confirmSenha = document.getElementById('confirmSenha').value;
          
          if(!nome || !email || !senha || !confirmSenha) {
              alert('Por favor, preencha todos os campos!');
              return;
          }
          
          if(senha !== confirmSenha) {
              alert('As senhas não coincidem!');
              return;
          }
          
          if(senha.length < 6) {
              alert('A senha deve ter no mínimo 6 caracteres!');
              return;
          }
          
          // Salvar dados do usuário
          const userData = { nome, email, senha };
          localStorage.setItem('petbuddy_user', JSON.stringify(userData));
          
          alert('Cadastro realizado com sucesso!');
          window.location.href = 'cadastro2.html';
      }
  </script>

  <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
  <script>
      function toggleDarkMode(){
          document.body.classList.toggle('dark');
          localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      }
      if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  </script>
</body>
</html>
